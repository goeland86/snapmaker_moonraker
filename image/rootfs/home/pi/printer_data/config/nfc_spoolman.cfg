# NFC Spoolman daemon configuration — snapmaker_moonraker defaults
#
# The default assumes a PN532 reader on a USB-UART bridge (shows up as
# /dev/ttyUSB0). If your Spoolman instance is on another host, change the
# spoolman.url below and restart the service:
#     sudo systemctl restart nfc-spoolman
#
# See https://github.com/goeland86/klipper-nfc-daemon for full documentation.

[nfc]
reader = pn532
pn532_device = /dev/ttyUSB0
pn532_baudrate = 115200
poll_interval = 0.5
debounce_time = 5.0

# multi_tool: scanned tags trigger a tool-selection prompt in Mainsail.
# Set to "single" if you have a single-extruder setup or prefer auto-assign.
mode = multi_tool
tools = 0,1

# Create Spoolman entries automatically for unknown OpenPrintTag tags.
auto_create = false

# Push a Mainsail preheat preset with the scanned filament's temperatures.
mainsail_preset = true

# Push filament metadata to the bridge via SAVE_VARIABLE (silently accepted —
# kept enabled for config compatibility with stock Klipper setups).
klipper_variables = true

[spoolman]
# Spoolman server URL. Default assumes a local instance; if Spoolman runs on
# another host, set this to e.g. http://berling:7912 and restart the service.
url = http://localhost:7912

[moonraker]
# Local bridge address — do not change.
url = http://127.0.0.1:7125
